<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>CAT TETRIS</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b0c0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <style>
    :root{
      --bg:#0b0c0f;
      --line:rgba(255,255,255,.10);
      --accent:#ff2d2d;
      --txt:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.55);
    }

    html, body{
      height:100%;
      overflow:hidden;
      position:fixed;
      width:100%;
      overscroll-behavior:none;
      touch-action:manipulation;
    }
    body{
      margin:0;
      background:radial-gradient(1200px 800px at 50% -10%, rgba(255,255,255,.08), transparent 60%), var(--bg);
      color:var(--txt);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    .wrap{
      width:min(520px, 96vw);
      padding:16px 12px 24px;
      overflow:hidden;
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin:8px 2px 12px;
    }
    .brand{
      display:flex; gap:10px; align-items:baseline;
      letter-spacing:.18em;
    }
    .brand b{font-weight:800;}
    .brand span{color:var(--muted); font-weight:600; font-size:13px;}

    .pills{display:flex; gap:10px; align-items:center;}
    .pill{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:999px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.08em;
      font-size:12px;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .pillBtn{
      cursor:pointer;
    }
    .pillBtn:active{ transform:translateY(1px); }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 0 3px rgba(255,45,45,.15);
    }

    .stage{
      border-radius:24px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      padding:14px;
    }

    .boardWrap{
      position:relative;
    }

    canvas{
      width:100%;
      height:auto;
      display:block;
      border-radius:18px;
      background:
        radial-gradient(900px 600px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
        #0a0d16;
      border:1px solid rgba(255,255,255,.08);
    }

    /* HUD Overlay: 텍스트만 */
    .hudOverlay{
      position:absolute;
      top:14px;
      right:16px;
      z-index:10;
      pointer-events:none;
      padding:0;
      background:none;
      border:none;
      backdrop-filter:none;
    }
    .hudLine{
      display:flex;
      justify-content:space-between;
      gap:14px;
      margin:7px 0;
      min-width:140px;
    }
    .k2{
      color:rgba(255,255,255,.65);
      font-weight:900;
      font-size:11px;
      letter-spacing:.16em;
      text-shadow:0 2px 6px rgba(0,0,0,.6);
    }
    .hudLine b{
      font-weight:950;
      font-size:16px;
      color:rgba(255,255,255,.95);
      text-shadow:0 2px 8px rgba(0,0,0,.7);
    }

    /* Touch Controls */
    .touchBar{ margin-top:14px; }
    .touchRow{
      display:grid;
      gap:10px;
      margin-top:10px;
      grid-template-columns: 1fr 1fr 1.4fr 1fr 1fr; /* 좌 아래 DROP 회전 우 */
    }

    .tbtn{
      height:64px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--txt);
      font-size:18px;
      font-weight:900;
      letter-spacing:.02em;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .tbtn:active{ transform:translateY(1px); }
    .tbtn.accent{
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.12);
      color:rgba(255,255,255,.95);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <b>CAT</b>
        <span>TETRIS / MINIMAL GRID SYSTEM</span>
      </div>

      <div class="pills">
        <div class="pill"><span class="dot"></span>RUN</div>
        <button id="soundBtn" class="pill pillBtn" type="button">SOUND OFF</button>
      </div>
    </div>

    <div class="stage">
      <div class="boardWrap">
        <canvas id="game" width="300" height="600"></canvas>

        <div class="hudOverlay">
          <div class="hudLine"><span class="k2">SCORE</span><b id="score">0</b></div>
          <div class="hudLine"><span class="k2">LEVEL</span><b id="level">1</b></div>
          <div class="hudLine"><span class="k2">LINES</span><b id="lines">0</b></div>
          <div class="hudLine"><span class="k2">COMBO</span><b id="combo">0</b></div>
        </div>
      </div>

      <div class="touchBar">
        <div class="touchRow">
          <button class="tbtn" data-act="left">←</button>
          <button class="tbtn" data-act="down">↓</button>
          <button class="tbtn accent" data-act="drop">DROP</button>
          <button class="tbtn" data-act="cw">⟳</button>
          <button class="tbtn" data-act="right">→</button>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  // =========================
  // AUDIO (iOS-friendly)
  // =========================
  let audioCtx = null;
  let master = null;
  let bgmTimer = null;
  let bgmStep = 0;

  let soundOn = (localStorage.getItem("cat_tetris_sound") === "1");

  const soundBtn = document.getElementById("soundBtn");
  function paintSoundBtn(){
    soundBtn.textContent = soundOn ? "SOUND ON" : "SOUND OFF";
    soundBtn.style.color = soundOn ? "rgba(255,255,255,.9)" : "rgba(255,255,255,.55)";
    soundBtn.style.borderColor = soundOn ? "rgba(255,255,255,.18)" : "rgba(255,255,255,.10)";
  }
  paintSoundBtn();

  function ensureAudio(){
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    master = audioCtx.createGain();
    master.gain.value = soundOn ? 0.55 : 0.0;
    master.connect(audioCtx.destination);

    // iOS에서 resume 필요
    if (audioCtx.state === "suspended") audioCtx.resume();

    if (soundOn) startBGM();
  }

  function setMaster(on){
    ensureAudio();
    master.gain.setTargetAtTime(on ? 0.55 : 0.0, audioCtx.currentTime, 0.02);
  }

  // 간단 8비트 루프(오리지널)
  // 숫자는 MIDI note. (C4=60)
  const BGM = [
    // 16-step x 4 bars (짧은 루프)
    64, 64, 67, 69, 67, 64, 62, 62,
    64, 64, 67, 69, 71, 69, 67, 64,

    62, 62, 64, 67, 64, 62, 60, 60,
    62, 62, 64, 67, 69, 67, 64, 62,

    64, 64, 67, 69, 67, 64, 62, 62,
    64, 64, 67, 69, 71, 69, 67, 64,

    71, 69, 67, 64, 67, 64, 62, 60,
    62, 64, 67, 69, 67, 64, 62, 60,
  ];

  function midiToHz(m){ return 440 * Math.pow(2, (m - 69) / 12); }

  function beep({hz=440, type="square", dur=0.06, gain=0.18, at=0, slideTo=null}){
    if(!soundOn) return;
    ensureAudio();

    const t0 = audioCtx.currentTime + at;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(hz, t0);

    if (slideTo){
      osc.frequency.exponentialRampToValueAtTime(Math.max(40, slideTo), t0 + dur);
    }

    // envelope
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

    osc.connect(g);
    g.connect(master);

    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  function startBGM(){
    if(!soundOn) return;
    ensureAudio();
    stopBGM();

    const bpm = 132;
    const stepMs = (60000 / bpm) / 2; // 8th note

    bgmStep = 0;
    bgmTimer = setInterval(() => {
      if(!soundOn || !audioCtx) return;

      const note = BGM[bgmStep % BGM.length];
      const hz = midiToHz(note);

      // melody
      beep({ hz, type:"square", dur:0.08, gain:0.08 });

      // subtle bass every 2 steps
      if ((bgmStep % 4) === 0){
        beep({ hz: hz/2, type:"triangle", dur:0.10, gain:0.05, at:0.00 });
      }

      bgmStep++;
    }, stepMs);
  }

  function stopBGM(){
    if (bgmTimer){
      clearInterval(bgmTimer);
      bgmTimer = null;
    }
  }

  function sfx(action){
    // 버튼 누를 때 효과음 (액션별로 약간 다르게)
    if(!soundOn) return;

    if(action==="left" || action==="right"){
      beep({ hz: 520, type:"square", dur:0.035, gain:0.10 });
    } else if(action==="down"){
      beep({ hz: 380, type:"square", dur:0.03, gain:0.08 });
    } else if(action==="cw"){
      beep({ hz: 740, type:"square", dur:0.05, gain:0.10, slideTo:520 });
    } else if(action==="drop"){
      // 드롭은 '툭' 떨어지는 느낌
      beep({ hz: 180, type:"triangle", dur:0.09, gain:0.14, slideTo:90 });
      beep({ hz: 240, type:"square", dur:0.04, gain:0.06, at:0.01 });
    }
  }

  function sfxLineClear(lines){
    if(!soundOn) return;
    // 라인 수에 따라 더 화려하게
    const base = 660;
    const seq = (lines >= 4)
      ? [base, base*1.26, base*1.50, base*2.0]
      : (lines === 3)
        ? [base, base*1.26, base*1.50]
        : (lines === 2)
          ? [base, base*1.26]
          : [base];

    seq.forEach((hz, i) => {
      beep({ hz, type:"square", dur:0.07, gain:0.12, at: i*0.05 });
    });
  }

  // SOUND 버튼
  soundBtn.addEventListener("click", (e) => {
    e.preventDefault();
    ensureAudio();
    soundOn = !soundOn;
    localStorage.setItem("cat_tetris_sound", soundOn ? "1" : "0");
    paintSoundBtn();
    setMaster(soundOn);
    if(soundOn) startBGM(); else stopBGM();
  }, {passive:false});

  // iOS: 첫 사용자 제스처에서 오디오 unlock
  const unlock = () => {
    ensureAudio();
    window.removeEventListener("touchstart", unlock);
    window.removeEventListener("mousedown", unlock);
  };
  window.addEventListener("touchstart", unlock, {passive:true});
  window.addEventListener("mousedown", unlock, {passive:true});

  // =========================
  // GAME
  // =========================
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const COLS = 10, ROWS = 20;
  const SIZE = canvas.width / COLS;

  let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

  const SHAPES = [
    [[1,1,1,1]],                 // I
    [[1,1],[1,1]],               // O
    [[0,1,0],[1,1,1]],           // T
    [[1,0,0],[1,1,1]],           // J
    [[0,0,1],[1,1,1]],           // L
    [[0,1,1],[1,1,0]],           // S
    [[1,1,0],[0,1,1]],           // Z
  ];

  const state = {
    score: 0,
    level: 1,
    lines: 0,
    combo: 0,
    dropMs: 650,
    paused: false,
    gameOver: false,
  };

  const ui = {
    score: document.getElementById("score"),
    level: document.getElementById("level"),
    lines: document.getElementById("lines"),
    combo: document.getElementById("combo"),
  };

  function rnd(n){ return Math.floor(Math.random()*n); }
  function clone(m){ return m.map(r=>r.slice()); }

  function spawnPiece(){
    const shape = clone(SHAPES[rnd(SHAPES.length)]);
    const x = Math.floor((COLS - shape[0].length)/2);
    const y = 0;
    return { shape, x, y };
  }

  let piece = spawnPiece();

  function drawCell(x, y, fill){
    ctx.fillStyle = fill;
    ctx.fillRect(x*SIZE, y*SIZE, SIZE-1, SIZE-1);
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width, canvas.height);

    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 1;
    for(let x=0;x<=COLS;x++){
      ctx.beginPath(); ctx.moveTo(x*SIZE, 0); ctx.lineTo(x*SIZE, canvas.height); ctx.stroke();
    }
    for(let y=0;y<=ROWS;y++){
      ctx.beginPath(); ctx.moveTo(0, y*SIZE); ctx.lineTo(canvas.width, y*SIZE); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    for(let y=0;y<ROWS;y++){
      for(let x=0;x<COLS;x++){
        if(board[y][x]) drawCell(x,y,"rgba(255,255,255,.18)");
      }
    }

    for(let dy=0;dy<piece.shape.length;dy++){
      for(let dx=0;dx<piece.shape[dy].length;dx++){
        if(piece.shape[dy][dx]){
          drawCell(piece.x+dx, piece.y+dy, "rgba(140,200,255,.85)");
        }
      }
    }
  }

  function collide(px, py, shape){
    for(let dy=0;dy<shape.length;dy++){
      for(let dx=0;dx<shape[dy].length;dx++){
        if(!shape[dy][dx]) continue;
        const x = px + dx;
        const y = py + dy;
        if(x < 0 || x >= COLS || y >= ROWS) return true;
        if(y >= 0 && board[y][x]) return true;
      }
    }
    return false;
  }

  function merge(){
    for(let dy=0;dy<piece.shape.length;dy++){
      for(let dx=0;dx<piece.shape[dy].length;dx++){
        if(piece.shape[dy][dx]){
          const y = piece.y+dy;
          const x = piece.x+dx;
          if(y < 0){ state.gameOver = true; return; }
          board[y][x] = 1;
        }
      }
    }
  }

  function clearLines(){
    let cleared = 0;
    for(let y=ROWS-1;y>=0;){
      if(board[y].every(v=>v===1)){
        board.splice(y,1);
        board.unshift(Array(COLS).fill(0));
        cleared++;
      } else {
        y--;
      }
    }

    if(cleared>0){
      // ✅ 라인 삭제 효과음
      sfxLineClear(cleared);

      state.lines += cleared;
      state.score += [0,100,300,500,800][cleared] * state.level;
      state.combo += 1;

      const newLevel = 1 + Math.floor(state.lines/10);
      if(newLevel !== state.level){
        state.level = newLevel;
        state.dropMs = Math.max(120, 650 - (state.level-1)*50);
      }
    } else {
      state.combo = 0;
    }

    ui.score.textContent = state.score;
    ui.level.textContent = state.level;
    ui.lines.textContent = state.lines;
    ui.combo.textContent = state.combo;
  }

  function softDrop(){
    if(!collide(piece.x, piece.y+1, piece.shape)){
      piece.y++;
    } else {
      merge();
      if(state.gameOver) return;
      clearLines();
      piece = spawnPiece();
      if(collide(piece.x, piece.y, piece.shape)) state.gameOver = true;
    }
  }

  function hardDrop(){
    while(!collide(piece.x, piece.y+1, piece.shape)){
      piece.y++;
    }
    merge();
    if(state.gameOver) return;
    clearLines();
    piece = spawnPiece();
    if(collide(piece.x, piece.y, piece.shape)) state.gameOver = true;
  }

  function rotateCW(shape){
    const h = shape.length, w = shape[0].length;
    const out = Array.from({length:w}, ()=>Array(h).fill(0));
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        out[x][h-1-y] = shape[y][x];
      }
    }
    return out;
  }

  function doRotateCW(){
    const next = rotateCW(piece.shape);
    if(!collide(piece.x, piece.y, next)){
      piece.shape = next;
      return;
    }
    if(!collide(piece.x-1, piece.y, next)){ piece.x--; piece.shape = next; return; }
    if(!collide(piece.x+1, piece.y, next)){ piece.x++; piece.shape = next; return; }
  }

  function moveLeft(){ if(!collide(piece.x-1, piece.y, piece.shape)) piece.x--; }
  function moveRight(){ if(!collide(piece.x+1, piece.y, piece.shape)) piece.x++; }

  function act(a){
    if(state.gameOver) return;
    if(state.paused) return;

    // ✅ 버튼 효과음
    if(a==="left" || a==="right" || a==="down" || a==="drop" || a==="cw"){
      sfx(a);
    }

    if(a==="left") moveLeft();
    else if(a==="right") moveRight();
    else if(a==="down") softDrop();
    else if(a==="drop") hardDrop();
    else if(a==="cw") doRotateCW();
  }

  document.querySelectorAll(".tbtn").forEach(btn=>{
    const a = btn.dataset.act;
    btn.addEventListener("click", e => { e.preventDefault(); ensureAudio(); act(a); draw(); }, {passive:false});
    btn.addEventListener("touchstart", e => { e.preventDefault(); ensureAudio(); act(a); draw(); }, {passive:false});
  });

  window.addEventListener("keydown", (e)=>{
    if(e.key==="ArrowLeft") act("left");
    else if(e.key==="ArrowRight") act("right");
    else if(e.key==="ArrowDown") act("down");
    else if(e.key===" ") act("drop");
    else if(e.key==="x" || e.key==="X") act("cw");
    draw();
  });

  let last = performance.now();
  function loop(t){
    if(!state.paused && !state.gameOver){
      if(t - last >= state.dropMs){
        softDrop();
        last = t;
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  // init
  draw();
  requestAnimationFrame(loop);

  // PWA service worker register
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js");
  }

  // 페이지 로드시 sound 상태 반영(오디오는 사용자 제스처 후 시작)
  if (soundOn){
    // 버튼 표시만 ON으로. 실제 재생은 첫 제스처(터치/클릭)에서 시작되게 함.
    paintSoundBtn();
  }
})();
</script>
</body>
</html>
