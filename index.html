<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>CAT TETRIS</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b0c0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <style>
    :root{
      --bg:#0b0c0f;
      --line:rgba(255,255,255,.10);
      --txt:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.55);
      --accent:#ff2d2d;
    }

    /* ✅ 스크롤/바운스 방지 + PWA/Safari 주소창 변동 대응 */
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(1200px 800px at 50% -10%, rgba(255,255,255,.08), transparent 60%),
        var(--bg);
      color:var(--txt);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      overscroll-behavior:none;
      touch-action:manipulation;
    }
    body{
      position:fixed;
      inset:0;
      height:100dvh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }

    /* ✅ 한 화면(100dvh) 안에 "헤더 + 게임" 강제 배치 */
    .wrap{
      width:min(520px, 96vw);
      height:100dvh;
      display:flex;
      flex-direction:column;
      box-sizing:border-box;
      padding:
        calc(env(safe-area-inset-top) + 10px)
        12px
        calc(env(safe-area-inset-bottom) + 14px)
        12px;
    }

    .top{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin:8px 2px 12px;
    }

    .brand{
      display:flex; gap:10px; align-items:baseline;
      letter-spacing:.18em;
      min-width:0;
    }
    .brand b{font-weight:900;}
    .brand span{
      color:var(--muted);
      font-weight:700;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:60vw;
    }

    .pill{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:999px;
      color:rgba(255,255,255,.78);
      font-weight:900;
      letter-spacing:.10em;
      font-size:12px;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      flex:0 0 auto;
    }
    .pill:active{ transform:translateY(1px); }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 0 3px rgba(255,45,45,.15);
    }

    /* ✅ stage가 남은 공간을 모두 사용(버튼이 밀려 내려가지 않게) */
    .stage{
      flex:1 1 auto;
      min-height:0;
      border-radius:0px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      padding:14px;
      display:flex;
      flex-direction:column;
    }

    /* ✅ 보드 영역은 stage 안에서 가능한 최대 */
    .boardWrap{
      position:relative;
      flex:1 1 auto;
      min-height:0;
      border-radius:0px;
      overflow:hidden;
    }

    /* ✅ 캔버스는 boardWrap을 꽉 채움 (버튼 유지) */
    canvas#game{
      width:100%;
      height:100%;
      display:block;
      border-radius:0px;
      background:
        radial-gradient(900px 600px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
        #0a0d16;
      border:1px solid rgba(255,255,255,.08);
      -webkit-tap-highlight-color:transparent;
    }

    /* ✅ HUD: 글자만(배경 완전 투명) + 작게 */
    .hudOverlay{
      position:absolute;
      top:14px;
      right:16px;
      text-align:right;
      font-weight:900;
      letter-spacing:.18em;
      pointer-events:none;
      user-select:none;
      background:transparent;
      border:none;
      padding:0;
    }
    .hudLine{
      display:flex;
      justify-content:flex-end;
      align-items:baseline;
      gap:10px;
      margin:8px 0;
    }
    .k2{
      color:rgba(255,255,255,.55);
      font-size:11px;
    }
    .hudLine b{
      color:rgba(255,255,255,.92);
      font-size:14px;
      min-width:24px;
      text-align:right;
      letter-spacing:.06em;
    }

    /* Touch Controls */
    .touchBar{
      flex:0 0 auto;
      margin-top:12px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .touchRow{
      display:grid;
      gap:10px;
    }
    .touchRow.five{
      grid-template-columns: 1fr 1fr 1.4fr 1fr 1fr;
    }

    .tbtn{
      height:64px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--txt);
      font-size:18px;
      font-weight:900;
      letter-spacing:.02em;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .tbtn:active{ transform:translateY(1px); }
    .tbtn.accent{
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.12);
      color:rgba(255,255,255,.95);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <b>CAT</b>
        <span>TETRIS / MINIMAL GRID SYSTEM</span>
      </div>

      <div style="display:flex; gap:10px; align-items:center;">
        <div class="pill"><span class="dot"></span>RESET</div>
        <div id="soundBtn" class="pill">SOUND OFF</div>
      </div>
    </div>

    <div class="stage">
      <div class="boardWrap">
        <canvas id="game" width="300" height="600"></canvas>

        <div class="hudOverlay">
          <div class="hudLine"><span class="k2">SCORE</span><b id="score">0</b></div>
          <div class="hudLine"><span class="k2">LEVEL</span><b id="level">1</b></div>
          <div class="hudLine"><span class="k2">LINES</span><b id="lines">0</b></div>
          <div class="hudLine"><span class="k2">COMBO</span><b id="combo">0</b></div>
        </div>
      </div>

      <div class="touchBar">
        <div class="touchRow five">
          <button class="tbtn" data-act="left">←</button>
          <button class="tbtn" data-act="down">↓</button>
          <button class="tbtn accent" data-act="drop">DROP</button>
          <button class="tbtn" data-act="cw">⟳</button>
          <button class="tbtn" data-act="right">→</button>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  /* =========================
     GAME
  ========================= */
  const COLS = 10, ROWS = 20;
  const SIZE = canvas.width / COLS;

  let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

  const SHAPES = [
    [[1,1,1,1]],                 // I
    [[1,1],[1,1]],               // O
    [[0,1,0],[1,1,1]],           // T
    [[1,0,0],[1,1,1]],           // J
    [[0,0,1],[1,1,1]],           // L
    [[0,1,1],[1,1,0]],           // S
    [[1,1,0],[0,1,1]],           // Z
  ];

  const state = {
    score: 0,
    level: 1,
    lines: 0,
    combo: 0,
    dropMs: 520,
    paused: false,
    gameOver: false,
  };

  const ui = {
    score: document.getElementById("score"),
    level: document.getElementById("level"),
    lines: document.getElementById("lines"),
    combo: document.getElementById("combo"),
  };

  function rnd(n){ return Math.floor(Math.random()*n); }
  function clone(m){ return m.map(r=>r.slice()); }

  function spawnPiece(){
    const shape = clone(SHAPES[rnd(SHAPES.length)]);
    const x = Math.floor((COLS - shape[0].length)/2);
    const y = 0;
    return { shape, x, y };
  }

  let piece = spawnPiece();

  // 라인 플래시(색 변하고 삭제)
  let flashRows = [];
  let flashUntil = 0;

  function drawCell(x, y, fill){
    ctx.fillStyle = fill;
    ctx.fillRect(x*SIZE, y*SIZE, SIZE-1, SIZE-1);
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width, canvas.height);

    // grid
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 1;
    for(let x=0;x<=COLS;x++){
      ctx.beginPath(); ctx.moveTo(x*SIZE, 0); ctx.lineTo(x*SIZE, canvas.height); ctx.stroke();
    }
    for(let y=0;y<=ROWS;y++){
      ctx.beginPath(); ctx.moveTo(0, y*SIZE); ctx.lineTo(canvas.width, y*SIZE); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // board
    for(let y=0;y<ROWS;y++){
      for(let x=0;x<COLS;x++){
        if(board[y][x]) drawCell(x,y,"rgba(255,255,255,.18)");
      }
    }

    // flash rows (색 변함)
    if(performance.now() < flashUntil){
      for(const ry of flashRows){
        for(let x=0;x<COLS;x++){
          drawCell(x, ry, "rgba(200,240,255,.75)");
        }
      }
    }

    // piece
    for(let dy=0;dy<piece.shape.length;dy++){
      for(let dx=0;dx<piece.shape[dy].length;dx++){
        if(piece.shape[dy][dx]){
          drawCell(piece.x+dx, piece.y+dy, "rgba(140,200,255,.85)");
        }
      }
    }
  }

  function collide(px, py, shape){
    for(let dy=0;dy<shape.length;dy++){
      for(let dx=0;dx<shape[dy].length;dx++){
        if(!shape[dy][dx]) continue;
        const x = px + dx;
        const y = py + dy;
        if(x < 0 || x >= COLS || y >= ROWS) return true;
        if(y >= 0 && board[y][x]) return true;
      }
    }
    return false;
  }

  function merge(){
    for(let dy=0;dy<piece.shape.length;dy++){
      for(let dx=0;dx<piece.shape[dy].length;dx++){
        if(piece.shape[dy][dx]){
          const y = piece.y+dy;
          const x = piece.x+dx;
          if(y < 0){ state.gameOver = true; return; }
          board[y][x] = 1;
        }
      }
    }
  }

  function updateUI(){
    ui.score.textContent = state.score;
    ui.level.textContent = state.level;
    ui.lines.textContent = state.lines;
    ui.combo.textContent = state.combo;
  }

  function clearLines(){
    const full = [];
    for(let y=ROWS-1;y>=0;y--){
      if(board[y].every(v=>v===1)) full.push(y);
    }
    if(!full.length){
      state.combo = 0;
      updateUI();
      return;
    }

    // ✅ 라인 색 한번 변하고 삭제
    flashRows = full.slice();
    flashUntil = performance.now() + 120;

    // ✅ 라인 삭제 사운드(줄 수에 따라 피치 변화)
    sfxLineClear(full.length);

    setTimeout(() => {
      full.sort((a,b)=>b-a).forEach(y=>{
        board.splice(y,1);
        board.unshift(Array(COLS).fill(0));
      });
    }, 120);

    state.lines += full.length;
    state.score += [0,100,300,500,800][full.length] * state.level;
    state.combo += 1;

    const newLevel = 1 + Math.floor(state.lines/10);
    if(newLevel !== state.level){
      state.level = newLevel;
      state.dropMs = Math.max(120, 520 - (state.level-1)*38);
    }

    updateUI();
  }

  function softDrop(){
    if(!collide(piece.x, piece.y+1, piece.shape)){
      piece.y++;
    } else {
      merge();
      sfxLock(); // 착지/고정 사운드
      if(state.gameOver) return;
      clearLines();
      piece = spawnPiece();
      if(collide(piece.x, piece.y, piece.shape)) state.gameOver = true;
    }
  }

  function hardDrop(){
    while(!collide(piece.x, piece.y+1, piece.shape)){
      piece.y++;
    }
    merge();
    sfxLock();
    if(state.gameOver) return;
    clearLines();
    piece = spawnPiece();
    if(collide(piece.x, piece.y, piece.shape)) state.gameOver = true;
  }

  function rotateCW(shape){
    const h = shape.length, w = shape[0].length;
    const out = Array.from({length:w}, ()=>Array(h).fill(0));
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        out[x][h-1-y] = shape[y][x];
      }
    }
    return out;
  }

  function doRotateCW(){
    const next = rotateCW(piece.shape);
    if(!collide(piece.x, piece.y, next)){
      piece.shape = next;
      return;
    }
    if(!collide(piece.x-1, piece.y, next)){ piece.x--; piece.shape = next; return; }
    if(!collide(piece.x+1, piece.y, next)){ piece.x++; piece.shape = next; return; }
  }

  function moveLeft(){
    if(!collide(piece.x-1, piece.y, piece.shape)) piece.x--;
  }
  function moveRight(){
    if(!collide(piece.x+1, piece.y, piece.shape)) piece.x++;
  }
  
  function resetGame(){
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
  piece = spawnPiece();

  state.score = 0;
  state.level = 1;
  state.lines = 0;
  state.combo = 0;
  state.dropMs = 520;
  state.paused = false;
  state.gameOver = false;

  flashRows = [];
  flashUntil = 0;

  updateUI();
  draw();
}

document.getElementById("resetBtn").addEventListener("click", (e)=>{
  e.preventDefault();
  resetGame();
});

    /* =========================
     FRENCH HOUSE-ish SOUND (Daft Punk vibe)
     - iOS/PWA 안정형 scheduler
     - SFX quieter
  ========================= */
  let audioCtx = null;
  let soundOn = false;

  let musicGain = null;   // 음악 마스터
  let sfxGain = null;     // SFX 마스터

  // scheduler
  let musicTimer = null;
  let nextNoteTime = 0;

  const BPM = 124;                   // 프렌치 하우스 템포
  const secondsPerBeat = 60 / BPM;
  const STEP = 0.25;                 // 16th note
  const stepSec = secondsPerBeat * STEP;

  const LOOKAHEAD_MS = 25;
  const SCHEDULE_AHEAD_SEC = 0.14;

  let stepIndex = 0;

  // sidechain/pump envelope (음악에만 적용)
  let pump = 0; // 0..1

  function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === "suspended") audioCtx.resume();

    if(!musicGain){
      musicGain = audioCtx.createGain();
      musicGain.gain.value = 0.18;       // ✅ 음악 마스터 (필요시 0.22까지)
      musicGain.connect(audioCtx.destination);
    }
    if(!sfxGain){
      sfxGain = audioCtx.createGain();
      sfxGain.gain.value = 0.35;         // ✅ SFX 마스터: 크게 줄임 (0.25~0.45 추천)
      sfxGain.connect(audioCtx.destination);
    }
  }

  function oscAt(time, freq, dur, type, vol, outGain){
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, time);

    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(vol, time + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);

    o.connect(g).connect(outGain);
    o.start(time);
    o.stop(time + dur + 0.02);
  }

  function noiseAt(time, dur, vol, outGain){
    const len = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<len;i++){
      data[i] = (Math.random()*2-1) * (1 - i/len);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;

    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);

    // 약간의 하이패스 느낌(간단 구현: 노이즈를 짧게 + 낮은 vol)
    src.connect(g).connect(outGain);
    src.start(time);
    src.stop(time + dur + 0.01);
  }

  // ---- sidechain-ish pump (kick 때마다 펌핑) ----
  function applyPump(){
    // kick 직후 pump=1, 이후 서서히 0으로 감쇠
    pump *= 0.90;
    // pump가 클수록 음악이 더 줄어드는 느낌
    const target = 0.18 * (1 - 0.55 * pump); // 기본 * (1 - 0.55*pump)
    if(musicGain){
      musicGain.gain.setTargetAtTime(target, audioCtx.currentTime, 0.02);
    }
  }

  // ===== SFX (조용하게) =====
  function sfxBeep(freq, dur=0.05, type="square", vol=0.05){
    if(!soundOn) return;
    ensureAudio();
    const t = audioCtx.currentTime + 0.001;
    oscAt(t, freq, dur, type, vol, sfxGain);
  }
  function sfxNoise(dur=0.02, vol=0.03){
    if(!soundOn) return;
    ensureAudio();
    const t = audioCtx.currentTime + 0.001;
    noiseAt(t, dur, vol, sfxGain);
  }

  function sfxTap(){ sfxBeep(520, 0.035, "square", 0.040); }
  function sfxRotate(){ sfxBeep(760, 0.045, "square", 0.045); }
  function sfxDrop(){ sfxBeep(220, 0.060, "sawtooth", 0.055); }
  function sfxLock(){ sfxBeep(170, 0.045, "triangle", 0.040); }
  function sfxLineClear(n){
    const base = 520 + n*120;
    sfxBeep(base, 0.070, "square", 0.060);
    setTimeout(()=>sfxBeep(base*1.26, 0.065, "square", 0.055), 70);
    setTimeout(()=>sfxNoise(0.03, 0.03), 40);
  }

  // ===== MUSIC (French house-ish) =====
  // 킥(4-on-the-floor) + 스네어/클랩(2,4) + 하이햇(8th/16th)
  // + 짧은 리드/스탭 (필터 느낌)
  function kickAt(time){
    // 빠른 피치 다운 킥(808-ish)
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = "sine";

    o.frequency.setValueAtTime(140, time);
    o.frequency.exponentialRampToValueAtTime(55, time + 0.10);

    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(0.55, time + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.18);

    o.connect(g).connect(musicGain);
    o.start(time);
    o.stop(time + 0.22);

    // pump 트리거
    pump = 1.0;
  }

  function clapAt(time){
    // 노이즈 + 짧은 톤 = 클랩 느낌
    noiseAt(time, 0.06, 0.10, musicGain);
    oscAt(time, 220, 0.05, "triangle", 0.04, musicGain);
  }

  function hatAt(time, open=false){
    noiseAt(time, open ? 0.06 : 0.02, open ? 0.06 : 0.045, musicGain);
  }

  function bassAt(time, semitone){
    // 톱니 베이스 + 짧게
    const base = 55; // A1
    const f = base * Math.pow(2, semitone/12);
    oscAt(time, f, 0.10, "sawtooth", 0.07, musicGain);
  }

  function leadAt(time, semitone){
    // “필터 스탭” 같은 짧은 리드
    const base = 220; // A3
    const f = base * Math.pow(2, semitone/12);
    oscAt(time, f, 0.07, "square", 0.05, musicGain);
    oscAt(time+0.01, f*2, 0.05, "square", 0.02, musicGain); // 위 옥타브 살짝
  }

  // 진행(무작위 느낌 최소화, 반복되는 하우스 루프)
  const bassProg = [0, 0, 3, 0, 5, 3, 0, 7]; // semitone steps from A
  const leadNotes = [12, 15, 19, 17, 15, 14, 12, 10]; // 간단한 훅(유사 멜로디지만 특정곡 아님)

  function scheduleStep(i, time){
    const beat16 = i % 16;             // 0..15
    const beat4 = i % 4;               // 0..3
    const beat = (i * STEP) % 4;       // 0..4beat

    // 4-on-the-floor kick: 매 4스텝(1beat)마다
    if(beat16 % 4 === 0){
      kickAt(time);
    }

    // clap/snare: 2,4 박(beat=1,3) -> 16스텝 기준 4,12
    if(beat16 === 4 || beat16 === 12){
      clapAt(time);
    }

    // hats: 8th 기본(2스텝마다), 가끔 16th
    if(beat16 % 2 === 1){
      hatAt(time, false);
    }
    if(beat16 === 15){
      hatAt(time, true); // 마디 끝 오픈햇
    }

    // bass: 매 박마다 살짝
    if(beat16 % 4 === 0){
      const idx = (Math.floor(i/4)) % bassProg.length;
      bassAt(time + 0.01, bassProg[idx]);
    }

    // lead: 8th에 훅
    if(beat16 % 2 === 0 && beat16 !== 0){
      const idx = (Math.floor(i/2)) % leadNotes.length;
      leadAt(time + 0.005, leadNotes[idx]);
    }
  }

  function scheduler(){
    if(!soundOn || !audioCtx) return;
    if(audioCtx.state === "suspended") audioCtx.resume();

    // pump 업데이트
    applyPump();

    while(nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD_SEC){
      scheduleStep(stepIndex, nextNoteTime);
      nextNoteTime += stepSec;
      stepIndex++;
    }
  }

  function startMusic(){
    ensureAudio();
    stopMusic();
    stepIndex = 0;
    nextNoteTime = audioCtx.currentTime + 0.03;
    pump = 0;
    musicTimer = setInterval(scheduler, LOOKAHEAD_MS);
  }

  function stopMusic(){
    if(musicTimer){
      clearInterval(musicTimer);
      musicTimer = null;
    }
  }

  function toggleSound(){
    soundOn = !soundOn;
    const btn = document.getElementById("soundBtn");
    btn.textContent = soundOn ? "SOUND ON" : "SOUND OFF";

    if(soundOn){
      ensureAudio();
      // 시작 확인음도 너무 크지 않게
      sfxBeep(880, 0.05, "square", 0.05);
      startMusic();
    }else{
      stopMusic();
    }
  }

  document.getElementById("soundBtn").addEventListener("click", (e)=>{
    e.preventDefault();
    toggleSound();
    function pauseMusicIfBackground(){
  stopMusic();
}

function resumeMusicIfForeground(){
  if(soundOn){
    ensureAudio();
    startMusic();
  }
}

document.addEventListener("visibilitychange", () => {
  if(document.hidden) pauseMusicIfBackground();
  else resumeMusicIfForeground();
});

// iOS Safari에서 더 확실하게 잡기
window.addEventListener("pagehide", pauseMusicIfBackground);
window.addEventListener("blur", pauseMusicIfBackground);
window.addEventListener("pageshow", () => resumeMusicIfForeground());
window.addEventListener("focus", () => resumeMusicIfForeground());
  });
  /* =========================
     INPUT
  ========================= */
  function act(a){
    if(state.gameOver) return;
    if(state.paused) return;

    if(a==="left"){ moveLeft(); sfxTap(); }
    else if(a==="right"){ moveRight(); sfxTap(); }
    else if(a==="down"){ softDrop(); sfxTap(); }
    else if(a==="drop"){ hardDrop(); sfxDrop(); }
    else if(a==="cw"){ doRotateCW(); sfxRotate(); }
  }

  document.querySelectorAll(".tbtn").forEach(btn=>{
    const a = btn.dataset.act;
    btn.addEventListener("click", e => { e.preventDefault(); act(a); draw(); }, {passive:false});
    btn.addEventListener("touchstart", e => { e.preventDefault(); act(a); draw(); }, {passive:false});
  });

  window.addEventListener("keydown", (e)=>{
    if(e.key==="ArrowLeft") act("left");
    else if(e.key==="ArrowRight") act("right");
    else if(e.key==="ArrowDown") act("down");
    else if(e.key===" ") act("drop");
    else if(e.key==="x" || e.key==="X") act("cw");
    draw();
  });

  /* =========================
     LOOP
  ========================= */
  let last = performance.now();
  function loop(t){
    if(!state.gameOver){
      if(t - last >= state.dropMs){
        softDrop();
        last = t;
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  updateUI();
  draw();
  requestAnimationFrame(loop);

  /* =========================
     PWA SW
  ========================= */
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js");
  }
})();
