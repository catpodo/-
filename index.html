<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>

<title>CAT TETRIS</title>

<link rel="manifest" href="./manifest.json"/>
<meta name="theme-color" content="#0b0c0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>

<style>
:root{
  --bg:#0b0c0f;
  --line:rgba(255,255,255,.10);
  --accent:#ff2d2d;
  --txt:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.55);
}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:manipulation;
  background:#0b0c0f;
  color:var(--txt);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

.wrap{
  height:100%;
  display:flex;
  flex-direction:column;
  padding:16px 12px;
  box-sizing:border-box;
}

.stage{
  flex:1;
  display:flex;
  flex-direction:column;
}

.boardWrap{
  position:relative;
  flex:1;
}

canvas{
  width:100%;
  height:100%;
  border-radius:18px;
  background:#0a0d16;
  border:1px solid rgba(255,255,255,.08);
}

/* ===== HUD Overlay ===== */

.hudOverlay{
  position:absolute;
  top:12px;
  right:12px;
  z-index:10;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(12px);
  pointer-events:none;
  min-width:130px;
}

.hudLine{
  display:flex;
  justify-content:space-between;
  padding:3px 0;
}

.k2{
  font-size:11px;
  letter-spacing:.14em;
  color:var(--muted);
  font-weight:800;
}

.hudLine b{
  font-size:16px;
  font-weight:900;
}

/* ===== Touch Buttons ===== */

.touchBar{
  margin-top:14px;
}

.touchRow{
  display:grid;
  grid-template-columns:1fr 1fr 1.4fr 1fr 1fr;
  gap:10px;
}

.tbtn{
  height:64px;
  border-radius:16px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.05);
  color:var(--txt);
  font-size:18px;
  font-weight:800;
}

.tbtn.accent{
  background:rgba(255,45,45,.18);
  border:1px solid rgba(255,45,45,.45);
}
</style>
</head>

<body>

<div class="wrap">

<div class="stage">

<div class="boardWrap">
<canvas id="game" width="300" height="600"></canvas>

<div class="hudOverlay">
  <div class="hudLine"><span class="k2">SCORE</span><b id="score">0</b></div>
  <div class="hudLine"><span class="k2">LEVEL</span><b id="level">1</b></div>
  <div class="hudLine"><span class="k2">LINES</span><b id="lines">0</b></div>
  <div class="hudLine"><span class="k2">COMBO</span><b id="combo">0</b></div>
</div>

</div>

<div class="touchBar">
<div class="touchRow">
  <button class="tbtn" data-act="left">←</button>
  <button class="tbtn" data-act="down">↓</button>
  <button class="tbtn accent" data-act="drop">DROP</button>
  <button class="tbtn" data-act="cw">⟳</button>
  <button class="tbtn" data-act="right">→</button>
</div>
</div>

</div>
</div>
