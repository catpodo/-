<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>CAT TETRIS</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b0c0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <style>
    :root{
      --bg:#0b0c0f;
      --line:rgba(255,255,255,.10);
      --accent:#ff2d2d;
      --txt:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.55);
      --radius:18px;
    }

    html,body{height:100%;}
    html{
      background: var(--bg);
      overscroll-behavior:none;
    }
    body{
      margin:0;
      color:var(--txt);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;

      /* ✅ 화면 스크롤 방지 */
      overflow:hidden;
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      touch-action:manipulation;

      background:
        radial-gradient(1200px 800px at 50% -10%, rgba(255,255,255,.08), transparent 60%),
        var(--bg);

      display:flex;
      justify-content:center;
      align-items:stretch;
    }

    /* ✅ Safe area 만큼 전체를 아래로 밀기 (상단 시계/노치 겹침 방지) */
    .wrap{
      width:min(520px, 96vw);
      height:100%;
      padding:
        calc(env(safe-area-inset-top) + 14px)
        12px
        calc(env(safe-area-inset-bottom) + 14px);
      padding-top: calc(constant(safe-area-inset-top) + 14px);
      padding-bottom: calc(constant(safe-area-inset-bottom) + 14px);

      box-sizing:border-box;
      display:flex;
      flex-direction:column;
      gap:12px;

      overflow:hidden;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 6px 2px 0;
      flex:0 0 auto;
    }

    .brand{
      display:flex; gap:10px; align-items:baseline;
      letter-spacing:.18em;
      min-width:0;
    }
    .brand b{font-weight:800; flex:0 0 auto;}
    .brand span{
      color:var(--muted);
      font-weight:600;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .topRight{
      display:flex;
      gap:10px;
      align-items:center;
      flex:0 0 auto;
    }

    .pill{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:999px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:.08em;
      font-size:12px;
      user-select:none;
    }
    .pillBtn{
      cursor:pointer;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 0 3px rgba(255,45,45,.15);
    }

    .stage{
      border-radius:24px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      padding:14px;
      flex:1 1 auto;
      min-height:0;

      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .boardWrap{
      position:relative;
      border-radius:18px;
      overflow:hidden;
      flex:1 1 auto;
      min-height:0;
    }

    canvas{
      width:100%;
      height:100%;
      display:block;
      background:
        radial-gradient(900px 600px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
        #0a0d16;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
    }

    /* ✅ 우측 상단 HUD(배경 투명, 글자만) */
    .hudOverlay{
      position:absolute;
      top:10px;
      right:10px;
      z-index:5;

      padding:10px 12px;
      border-radius:16px;
      background:transparent;        /* 핵심 */
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      display:grid;
      row-gap:6px;
      min-width:170px;
      pointer-events:none; /* 게임 조작 방해 X */
    }
    .hudLine{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:16px;
      font-weight:900;
      letter-spacing:.14em;
    }
    .k2{
      color:rgba(255,255,255,.55);
      font-size:12px;
      font-weight:900;
      letter-spacing:.18em;
    }
    .hudLine b{
      font-size:20px;
      letter-spacing:.02em;
      color:rgba(255,255,255,.92);
    }

    /* ✅ 하단 버튼(항상 보이게) */
    .touchBar{
      flex:0 0 auto;
    }
    .touchRow{
      display:grid;
      gap:10px;
    }
    .touchRow.five{
      grid-template-columns: 1fr 1fr 1.4fr 1fr 1fr;
    }
    .tbtn{
      height:62px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--txt);
      font-size:18px;
      font-weight:900;
      -webkit-tap-highlight-color: transparent;
      user-select:none;
    }
    .tbtn:active{ transform:translateY(1px); }
    .tbtn.accent{
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.14);
      color:rgba(255,255,255,.96);
      letter-spacing:.04em;
    }

    /* 작은 화면에서 버튼이 사라지지 않도록 최소 높이 보정 */
    @media (max-height: 720px){
      .tbtn{ height:56px; }
      .stage{ padding:12px; }
      .hudOverlay{ min-width:150px; }
      .hudLine b{ font-size:18px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <b>CAT</b>
        <span>TETRIS / MINIMAL GRID SYSTEM</span>
      </div>
      <div class="topRight">
        <div class="pill"><span class="dot"></span>RUN</div>
        <button id="soundBtn" class="pill pillBtn" type="button" aria-label="toggle sound">SOUND OFF</button>
      </div>
    </div>

    <div class="stage">
      <div class="boardWrap">
        <canvas id="game" width="300" height="600"></canvas>

        <div class="hudOverlay" aria-hidden="true">
          <div class="hudLine"><span class="k2">SCORE</span><b id="score">0</b></div>
          <div class="hudLine"><span class="k2">LEVEL</span><b id="level">1</b></div>
          <div class="hudLine"><span class="k2">LINES</span><b id="lines">0</b></div>
          <div class="hudLine"><span class="k2">COMBO</span><b id="combo">0</b></div>
        </div>
      </div>

      <!-- ✅ 버튼: 좌 / 아래1칸 / DROP / 회전 / 우 -->
      <div class="touchBar">
        <div class="touchRow five">
          <button class="tbtn" data-act="left" type="button">←</button>
          <button class="tbtn" data-act="down" type="button">↓</button>
          <button class="tbtn accent" data-act="drop" type="button">DROP</button>
          <button class="tbtn" data-act="cw" type="button">⟳</button>
          <button class="tbtn" data-act="right" type="button">→</button>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  // =========================
  // Canvas + Game State
  // =========================
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const COLS = 10, ROWS = 20;
  const SIZE = canvas.width / COLS;

  let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

  const SHAPES = [
    [[1,1,1,1]],                 // I
    [[1,1],[1,1]],               // O
    [[0,1,0],[1,1,1]],           // T
    [[1,0,0],[1,1,1]],           // J
    [[0,0,1],[1,1,1]],           // L
    [[0,1,1],[1,1,0]],           // S
    [[1,1,0],[0,1,1]],           // Z
  ];

  const state = {
    score: 0,
    level: 1,
    lines: 0,
    combo: 0,
    dropMs: 650,
    paused: false,
    gameOver: false,
  };

  const ui = {
    score: document.getElementById("score"),
    level: document.getElementById("level"),
    lines: document.getElementById("lines"),
    combo: document.getElementById("combo"),
  };

  function rnd(n){ return Math.floor(Math.random()*n); }
  function clone(m){ return m.map(r=>r.slice()); }

  function spawnPiece(){
    const shape = clone(SHAPES[rnd(SHAPES.length)]);
    const x = Math.floor((COLS - shape[0].length)/2);
    const y = 0;
    return { shape, x, y };
  }

  let piece = spawnPiece();

  function drawCell(x, y, fill){
    ctx.fillStyle = fill;
    ctx.fillRect(x*SIZE, y*SIZE, SIZE-1, SIZE-1);
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width, canvas.height);

    // grid
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 1;
    for(let x=0;x<=COLS;x++){
      ctx.beginPath(); ctx.moveTo(x*SIZE, 0); ctx.lineTo(x*SIZE, canvas.height); ctx.stroke();
    }
    for(let y=0;y<=ROWS;y++){
      ctx.beginPath(); ctx.moveTo(0, y*SIZE); ctx.lineTo(canvas.width, y*SIZE); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // board
    for(let y=0;y<ROWS;y++){
      for(let x=0;x<COLS;x++){
        if(board[y][x]) drawCell(x,y,"rgba(255,255,255,.18)");
      }
    }

    // piece
    for(let dy=0;dy<piece.shape.length;dy++){
      for(let dx=0;dx<piece.shape[dy].length;dx++){
        if(piece.shape[dy][dx]){
          drawCell(piece.x+dx, piece.y+dy, "rgba(140,200,255,.85)");
        }
      }
    }
  }

  function collide(px, py, shape){
    for(let dy=0;dy<shape.length;dy++){
      for(let dx=0;dx<shape[dy].length;dx++){
        if(!shape[dy][dx]) continue;
        const x = px + dx;
        const y = py + dy;
        if(x < 0 || x >= COLS || y >= ROWS) return true;
        if(y >= 0 && board[y][x]) return true;
      }
    }
    return false;
  }

  function merge(){
    for(let dy=0;dy<piece.shape.length;dy++){
      for(let dx=0;dx<piece.shape[dy].length;dx++){
        if(piece.shape[dy][dx]){
          const y = piece.y+dy;
          const x = piece.x+dx;
          if(y < 0){ state.gameOver = true; return; }
          board[y][x] = 1;
        }
      }
    }
  }

  function updateHud(){
    ui.score.textContent = state.score;
    ui.level.textContent = state.level;
    ui.lines.textContent = state.lines;
    ui.combo.textContent = state.combo;
  }

  function clearLines(){
    let cleared = 0;
    for(let y=ROWS-1;y>=0;){
      if(board[y].every(v=>v===1)){
        board.splice(y,1);
        board.unshift(Array(COLS).fill(0));
        cleared++;
      } else {
        y--;
      }
    }
    if(cleared>0){
      state.lines += cleared;
      state.score += [0,100,300,500,800][cleared] * state.level;
      state.combo += 1;

      const newLevel = 1 + Math.floor(state.lines/10);
      if(newLevel !== state.level){
        state.level = newLevel;
        state.dropMs = Math.max(120, 650 - (state.level-1)*50);
      }

      sfx.line(cleared);
    } else {
      state.combo = 0;
    }
    updateHud();
  }

  function softDrop(){
    if(!collide(piece.x, piece.y+1, piece.shape)){
      piece.y++;
    } else {
      merge();
      sfx.lock();
      if(state.gameOver) return;
      clearLines();
      piece = spawnPiece();
      if(collide(piece.x, piece.y, piece.shape)) state.gameOver = true;
    }
  }

  function hardDrop(){
    while(!collide(piece.x, piece.y+1, piece.shape)){
      piece.y++;
    }
    merge();
    sfx.drop();
    if(state.gameOver) return;
    clearLines();
    piece = spawnPiece();
    if(collide(piece.x, piece.y, piece.shape)) state.gameOver = true;
  }

  function rotateCW(shape){
    const h = shape.length, w = shape[0].length;
    const out = Array.from({length:w}, ()=>Array(h).fill(0));
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        out[x][h-1-y] = shape[y][x];
      }
    }
    return out;
  }

  function doRotateCW(){
    const next = rotateCW(piece.shape);
    if(!collide(piece.x, piece.y, next)){
      piece.shape = next;
      sfx.tap();
      return;
    }
    if(!collide(piece.x-1, piece.y, next)){ piece.x--; piece.shape = next; sfx.tap(); return; }
    if(!collide(piece.x+1, piece.y, next)){ piece.x++; piece.shape = next; sfx.tap(); return; }
  }

  function moveLeft(){
    if(!collide(piece.x-1, piece.y, piece.shape)){ piece.x--; sfx.tap(); }
  }
  function moveRight(){
    if(!collide(piece.x+1, piece.y, piece.shape)){ piece.x++; sfx.tap(); }
  }

  function act(a){
    if(state.gameOver) return;
    if(state.paused) return;

    if(a==="left") moveLeft();
    else if(a==="right") moveRight();
    else if(a==="down"){ softDrop(); sfx.tap(); }
    else if(a==="drop") hardDrop();
    else if(a==="cw") doRotateCW();
  }

  // =========================
  // ✅ Sound (WebAudio, 자체 생성음)
  // - 배경: 간단한 8bit 루프(테트리스 느낌)
  // - 버튼/드롭/라인: 효과음
  // =========================
  const soundBtn = document.getElementById("soundBtn");
  let audioCtx = null;
  let master = null;
  let bgInterval = null;
  let soundOn = false;

  function ensureAudio(){
    if(audioCtx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    master = audioCtx.createGain();
    master.gain.value = 0.18;
    master.connect(audioCtx.destination);
  }

  function tone(freq, dur=0.06, type="square", gain=0.6){
    if(!soundOn) return;
    ensureAudio();
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

    o.connect(g);
    g.connect(master);
    o.start(t0);
    o.stop(t0 + dur + 0.02);
  }

  function noise(dur=0.08, gain=0.35){
    if(!soundOn) return;
    ensureAudio();
    const t0 = audioCtx.currentTime;
    const bufferSize = Math.floor(audioCtx.sampleRate * dur);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++){
      data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(gain, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(g);
    g.connect(master);
    src.start(t0);
    src.stop(t0 + dur);
  }

  const sfx = {
    tap(){ tone(740, 0.04, "square", 0.22); },
    drop(){ tone(220, 0.08, "square", 0.35); tone(110, 0.10, "square", 0.25); },
    lock(){ tone(180, 0.05, "triangle", 0.20); },
    line(cleared){
      // 라인 수에 따라 살짝 상승하는 "띵" + 약한 노이즈
      const base = cleared >= 4 ? 880 : cleared === 3 ? 784 : cleared === 2 ? 660 : 523;
      tone(base, 0.10, "square", 0.35);
      tone(base*1.25, 0.08, "square", 0.22);
      noise(0.10, 0.10);
    }
  };

  // 배경 루프(간단 8bit arpeggio)
  function startBGM(){
    if(!soundOn) return;
    ensureAudio();
    stopBGM();

    const seq = [
      659, 494, 523, 587, 523, 494, 440, 440,
      523, 659, 587, 523, 494, 523, 587, 659,
      523, 440, 440, 0
    ];
    let i = 0;
    bgInterval = setInterval(() => {
      if(!soundOn) return;
      const f = seq[i % seq.length];
      if(f>0) tone(f, 0.09, "square", 0.12);
      i++;
    }, 120);
  }

  function stopBGM(){
    if(bgInterval){
      clearInterval(bgInterval);
      bgInterval = null;
    }
  }

  function setSound(on){
    soundOn = on;
    soundBtn.textContent = on ? "SOUND ON" : "SOUND OFF";
    if(on){
      ensureAudio();
      audioCtx.resume?.();
      startBGM();
      sfx.tap();
    }else{
      stopBGM();
    }
  }

  // iOS: 사용자 제스처에서만 오디오 시작 가능 → 버튼으로 토글
  soundBtn.addEventListener("click", (e) => {
    e.preventDefault();
    setSound(!soundOn);
  }, {passive:false});

  // =========================
  // Controls (touch + click)
  // =========================
  document.querySelectorAll(".tbtn").forEach(btn=>{
    const a = btn.dataset.act;
    btn.addEventListener("click", e => { e.preventDefault(); act(a); draw(); }, {passive:false});
    btn.addEventListener("touchstart", e => { e.preventDefault(); act(a); draw(); }, {passive:false});
  });

  window.addEventListener("keydown", (e)=>{
    if(e.key==="ArrowLeft") act("left");
    else if(e.key==="ArrowRight") act("right");
    else if(e.key==="ArrowDown") act("down");
    else if(e.key===" ") act("drop");
    else if(e.key==="x" || e.key==="X") act("cw");
    draw();
  });

  // =========================
  // Loop
  // =========================
  let last = performance.now();
  function loop(t){
    if(!state.paused && !state.gameOver){
      if(t - last >= state.dropMs){
        softDrop();
        last = t;
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  updateHud();
  draw();
  requestAnimationFrame(loop);

  // PWA SW
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js");
  }
})();
</script>
</body>
</html>
