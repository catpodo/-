<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CAT TETRIS</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
  margin:0;
  background:#0b0c0f;
  font-family:system-ui;
  color:#fff;
  text-align:center;
}

h1{
  margin:14px 0 6px;
  font-weight:600;
  letter-spacing:2px;
}

canvas{
  background:#0f1220;
  display:block;
  margin:0 auto;
  border-radius:14px;
}

.touchBar{
  margin-top:14px;
  padding:12px;
}

.touchRow{
  display:grid;
  grid-template-columns:1fr 1.4fr 1fr 1fr;
  gap:10px;
}

.tbtn{
  height:60px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
  color:#fff;
  font-size:18px;
  font-weight:600;
}

.tbtn:active{
  transform:translateY(1px);
}

.accent{
  background:#ff2d2d;
  border:none;
}
</style>
</head>

<body>

<h1>CAT TETRIS</h1>

<canvas id="game" width="300" height="600"></canvas>

<div class="touchBar">
  <div class="touchRow">
    <button class="tbtn" data-act="left">←</button>
    <button class="tbtn accent" data-act="drop">DROP</button>
    <button class="tbtn" data-act="rotate">⟳</button>
    <button class="tbtn" data-act="right">→</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const COLS = 10;
const ROWS = 20;
const SIZE = 30;

let board = Array.from({length:ROWS},()=>Array(COLS).fill(0));

let piece = {
  shape:[[1,1,1,1]],
  x:3,
  y:0
};

function drawCell(x,y,color){
  ctx.fillStyle=color;
  ctx.fillRect(x*SIZE,y*SIZE,SIZE-1,SIZE-1);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  board.forEach((row,y)=>{
    row.forEach((v,x)=>{
      if(v) drawCell(x,y,"#4aa3ff");
    });
  });
  piece.shape.forEach((row,dy)=>{
    row.forEach((v,dx)=>{
      if(v) drawCell(piece.x+dx,piece.y+dy,"#87cefa");
    });
  });
}

function collide(){
  return piece.shape.some((row,dy)=>
    row.some((v,dx)=>{
      if(!v) return false;
      let x=piece.x+dx;
      let y=piece.y+dy;
      return x<0||x>=COLS||y>=ROWS||board[y]?.[x];
    })
  );
}

function merge(){
  piece.shape.forEach((row,dy)=>{
    row.forEach((v,dx)=>{
      if(v){
        board[piece.y+dy][piece.x+dx]=1;
      }
    });
  });
}

function drop(){
  piece.y++;
  if(collide()){
    piece.y--;
    merge();
    piece.y=0;
  }
}

function hardDrop(){
  while(!collide()){
    piece.y++;
  }
  piece.y--;
  merge();
  piece.y=0;
}

function rotate(){
  piece.shape = piece.shape[0].map((_,i)=>
    piece.shape.map(row=>row[i]).reverse()
  );
}

document.querySelectorAll('.tbtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const act = btn.dataset.act;
    if(act==="left"){ piece.x--; if(collide()) piece.x++; }
    if(act==="right"){ piece.x++; if(collide()) piece.x--; }
    if(act==="rotate"){ rotate(); if(collide()) rotate(); }
    if(act==="drop"){ hardDrop(); }
    draw();
  });
});

setInterval(()=>{
  drop();
  draw();
},700);

draw();

// PWA
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
