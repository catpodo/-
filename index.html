<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b0c0f" />

  <style>
    :root{
      --bg:#0b0c0f;
      --line:rgba(255,255,255,.10);
      --txt:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.55);
      --accent:#ff2d2d;
    }
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(1200px 800px at 50% -10%, rgba(255,255,255,.08), transparent 60%),
        var(--bg);
      color:var(--txt);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      overscroll-behavior:none;
      touch-action:manipulation;
    }
    body{
      position:fixed;
      inset:0;
      height:100dvh;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }
    .wrap{
      width:min(520px, 96vw);
      height:100dvh;
      display:flex;
      flex-direction:column;
      box-sizing:border-box;
      padding:
        calc(env(safe-area-inset-top) + 10px)
        12px
        calc(env(safe-area-inset-bottom) + 14px)
        12px;
    }
    .top{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin:8px 2px 12px;
      gap:10px;
    }
    .brand{
      display:flex; gap:10px; align-items:baseline;
      letter-spacing:.18em;
      min-width:0;
    }
    .brand b{font-weight:900;}
    .brand span{
      color:var(--muted);
      font-weight:700;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:54vw;
    }
    .pill{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      border-radius:999px;
      color:rgba(255,255,255,.78);
      font-weight:900;
      letter-spacing:.10em;
      font-size:12px;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      flex:0 0 auto;
      cursor:pointer;
      white-space:nowrap;
    }
    .pill:active{ transform:translateY(1px); }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 0 3px rgba(255,45,45,.15);
    }

    .stage{
      flex:1 1 auto;
      min-height:0;
      border-radius:0;
      border:1px solid rgba(255,255,255,.10);

      flex-direction:column;

    .boardWrap{
      position:relative;
      flex:1 1 auto;
      min-height:0;
      border-radius:0;
      overflow:hidden;
    }
    canvas#game{
      width:100%;
      height:100%;
      display:block;
      border-radius:0;
      background:
        radial-gradient(900px 600px at 50% 30%, rgba(255,255,255,.06), transparent 60%),
        #0a0d16;
      border:1px solid rgba(255,255,255,.08);
      -webkit-tap-highlight-color:transparent;

    /* NEXT preview (보드 상단 좌측) */
    .nextOverlay{
      position:absolute;
      top:12px;
      left:12px;
      display:flex;
      align-items:flex-start;
      gap:10px;
      pointer-events:none;
      user-select:none;
      opacity:.85;

    .nextLabel{
      font-weight:900;
      letter-spacing:.18em;
      color:rgba(255,255,255,.55);
      font-size:11px;
      margin-top:2px;

    canvas#next{

    .hudOverlay{
      position:absolute;
      top:14px;

      text-align:right;
      font-weight:900;

      pointer-events:none;
      user-select:none;
      background:transparent;

    .tbtn.accent{

    /* GAME OVER overlay */
    .overlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
    }
    .overlay.show{ display:flex; }
    .panel{
      width:min(360px, 88%);
      border:1px solid rgba(255,255,255,.12);
      background:rgba(10,12,18,.92);
      padding:18px 16px;

    }
    .panel h2{
      margin:0 0 10px;

      letter-spacing:.18em;
      font-weight:900;
    }
    .panel p{
      margin:0 0 14px;
      color:rgba(255,255,255,.70);

    .panel .row{
      display:flex;

    .panel input{
      width:min(240px, 100%);

    /* Ranking */
    .rankBox{

      color:rgba(255,255,255,.86);
    }
    .rankItem small{
      color:rgba(255,255,255,.55);
      font-weight:800;
      letter-spacing:.04em;
    }
  </style>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <b>CAT</b>
        <span>TETRIS / MINIMAL GRID SYSTEM</span>
      </div>

      <div style="display:flex; gap:10px; align-items:center;">
        <div id="resetBtn" class="pill"><span class="dot"></span>RESET</div>
        <div id="musicBtn" class="pill">MUSIC OFF</div>
        <div id="sfxBtn" class="pill">SFX ON</div>
      </div>
    </div>

    <div class="stage">
      <div class="boardWrap">
        <canvas id="game" width="300" height="600"></canvas>

        <div class="nextOverlay">
          <div class="nextLabel">NEXT</div>
          <canvas id="next" width="72" height="72"></canvas>
        </div>

        <div class="hudOverlay">
          <div class="hudLine"><span class="k2">SCORE</span><b id="score">0</b></div>
          <div class="hudLine"><span class="k2">LEVEL</span><b id="level">1</b></div>
          <div class="hudLine"><span class="k2">LINES</span><b id="lines">0</b></div>
          <div class="hudLine"><span class="k2">COMBO</span><b id="combo">0</b></div>
        </div>

        <!-- Game Over overlay -->
        <div id="gameOverOverlay" class="overlay">
          <div class="panel">
            <h2>GAME OVER</h2>
            <p>
              SCORE <b id="finalScore">0</b> · LINES <b id="finalLines">0</b>
            </p>

            <div class="row">
              <input id="nameInput" maxlength="14" placeholder="NAME (for WORLD RANK)" />
            </div>
            <div class="row">
              <button id="submitScoreBtn">SUBMIT</button>
              <button id="retryBtn" class="primary">RETRY</button>
            </div>

            <div class="rankBox">
              <div class="rankTitle">WORLD TOP 20</div>
              <div id="rankList"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="touchBar">
        <div class="touchRow five">
          <!-- ✅ 버튼 순서: 좌, 아래, 드롭, 우, 회전 -->
          <button class="tbtn" data-act="left">←</button>
          <button class="tbtn" data-act="down">↓</button>
          <button class="tbtn accent" data-act="drop">DROP</button>
          <button class="tbtn" data-act="right">→</button>
          <button class="tbtn" data-act="cw">⟳</button>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  /* =========================
     SAFE TIMEOUT UTILS
  ========================= */
  let pendingTimeouts = new Set();
  function later(fn, ms){
    const id = setTimeout(() => {
      pendingTimeouts.delete(id);
      fn();
    }, ms);
    pendingTimeouts.add(id);
    return id;
  }
  function clearPendingTimeouts(){
    for(const id of pendingTimeouts) clearTimeout(id);
    pendingTimeouts.clear();
  }

  /* =========================
     CANVAS
  ========================= */
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const nextCanvas = document.getElementById("next");
  const nctx = nextCanvas.getContext("2d");

  /* =========================
     GAME
  ========================= */
  const COLS = 10, ROWS = 20;
  const SIZE = canvas.width / COLS;

  let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

  const SHAPES = [
    [[1,1,1,1]],                 // I
    [[1,1],[1,1]],               // O
    [[0,1,0],[1,1,1]],           // T
    [[1,0,0],[1,1,1]],           // J
    [[0,0,1],[1,1,1]],           // L
    [[0,1,1],[1,1,0]],           // S
    [[1,1,0],[0,1,1]],           // Z
  ];

  const state = {
    score: 0,
    level: 1,
    lines: 0,
    combo: 0,
    dropMs: 520,
    paused: false,
    gameOver: false,
  };

  const ui = {
    score: document.getElementById("score"),
    level: document.getElementById("level"),
    lines: document.getElementById("lines"),
    combo: document.getElementById("combo"),
  };

  const overlay = document.getElementById("gameOverOverlay");
  const finalScoreEl = document.getElementById("finalScore");
  const finalLinesEl = document.getElementById("finalLines");
  const retryBtn = document.getElementById("retryBtn");
  const submitScoreBtn = document.getElementById("submitScoreBtn");
  const nameInput = document.getElementById("nameInput");
  const rankList = document.getElementById("rankList");

  function rnd(n){ return Math.floor(Math.random()*n); }
  function clone(m){ return m.map(r=>r.slice()); }

  // bag-less simple random, but keep a NEXT piece buffered
  function spawnPiece(shapeOverride=null){
    const shape = shapeOverride ? clone(shapeOverride) : clone(SHAPES[rnd(SHAPES.length)]);
    const x = Math.floor((COLS - shape[0].length)/2);
    const y = 0;
    return { shape, x, y };
  }

  let nextShape = clone(SHAPES[rnd(SHAPES.length)]);
  let piece = spawnPiece(nextShape);
  nextShape = clone(SHAPES[rnd(SHAPES.length)]);

  // line flash
  let flashRows = [];
  let flashUntil = 0;

  function drawCell(x, y, fill){
    ctx.fillStyle = fill;
    ctx.fillRect(x*SIZE, y*SIZE, SIZE-1, SIZE-1);
  }

  function drawGrid(){
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 1;
    for(let x=0;x<=COLS;x++){
      ctx.beginPath(); ctx.moveTo(x*SIZE, 0); ctx.lineTo(x*SIZE, canvas.height); ctx.stroke();
    }
    for(let y=0;y<=ROWS;y++){
      ctx.beginPath(); ctx.moveTo(0, y*SIZE); ctx.lineTo(canvas.width, y*SIZE); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function drawNext(){
    nctx.clearRect(0,0,nextCanvas.width,nextCanvas.height);

    // subtle grid
    nctx.globalAlpha = 0.20;
    nctx.strokeStyle = "#ffffff";
    for(let i=0;i<=4;i++){
      nctx.beginPath(); nctx.moveTo(i*18,0); nctx.lineTo(i*18,72); nctx.stroke();
      nctx.beginPath(); nctx.moveTo(0,i*18); nctx.lineTo(72,i*18); nctx.stroke();
    }
    nctx.globalAlpha = 1;

    const shape = nextShape;
    const cell = 16;
    const pad = 2;

    // center in 4x4
    const w = shape[0].length;
    const h = shape.length;
    const ox = Math.floor((4 - w)/2);
    const oy = Math.floor((4 - h)/2);

    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        if(!shape[y][x]) continue;
        nctx.fillStyle = "rgba(140,200,255,.30)";
        nctx.fillRect((ox+x)*18+pad, (oy+y)*18+pad, cell, cell);
      }
    }
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width, canvas.height);
    drawGrid();

    // board
    for(let y=0;y<ROWS;y++){
      for(let x=0;x<COLS;x++){
        if(board[y][x]) drawCell(x,y,"rgba(255,255,255,.18)");
      }
    }

    // flash rows
    if(performance.now() < flashUntil){
      for(const ry of flashRows){
        for(let x=0;x<COLS;x++){
          drawCell(x, ry, "rgba(200,240,255,.75)");
        }
      }
    }

    // piece
    for(let dy=0;dy<piece.shape.length;dy++){
      for(let dx=0;dx<piece.shape[dy].length;dx++){
        if(piece.shape[dy][dx]){
          drawCell(piece.x+dx, piece.y+dy, "rgba(140,200,255,.85)");
        }
      }
    }
  }

  function collide(px, py, shape){
    for(let dy=0;dy<shape.length;dy++){
      for(let dx=0;dx<shape[dy].length;dx++){
        if(!shape[dy][dx]) continue;
        const x = px + dx;
        const y = py + dy;
        if(x < 0 || x >= COLS || y >= ROWS) return true;
        if(y >= 0 && board[y][x]) return true;
      }
    }
    return false;
  }

  function merge(){
    for(let dy=0;dy<piece.shape.length;dy++){
      for(let dx=0;dx<piece.shape[dy].length;dx++){
        if(piece.shape[dy][dx]){
          const y = piece.y+dy;
          const x = piece.x+dx;
          if(y < 0){ setGameOver(); return; }
          board[y][x] = 1;
        }
      }
    }
  }

  function updateUI(){
    ui.score.textContent = state.score;
    ui.level.textContent = state.level;
    ui.lines.textContent = state.lines;
    ui.combo.textContent = state.combo;
  }

  function rotateCW(shape){
    const h = shape.length, w = shape[0].length;
    const out = Array.from({length:w}, ()=>Array(h).fill(0));
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        out[x][h-1-y] = shape[y][x];
      }
    }
    return out;
  }
  function doRotateCW(){
    const next = rotateCW(piece.shape);
    if(!collide(piece.x, piece.y, next)){ piece.shape = next; return; }
    if(!collide(piece.x-1, piece.y, next)){ piece.x--; piece.shape = next; return; }
    if(!collide(piece.x+1, piece.y, next)){ piece.x++; piece.shape = next; return; }
  }
  function moveLeft(){ if(!collide(piece.x-1, piece.y, piece.shape)) piece.x--; }
  function moveRight(){ if(!collide(piece.x+1, piece.y, piece.shape)) piece.x++; }

  function clearLines(){
    const full = [];
    for(let y=ROWS-1;y>=0;y--){
      if(board[y].every(v=>v===1)) full.push(y);
    }
    if(!full.length){
      state.combo = 0;
      updateUI();
      return;
    }

    flashRows = full.slice();
    flashUntil = performance.now() + 120;

    sfxLineClear(full.length);

    later(() => {
      full.sort((a,b)=>b-a).forEach(y=>{
        board.splice(y,1);
        board.unshift(Array(COLS).fill(0));
      });
    }, 120);

    state.lines += full.length;
    state.score += [0,100,300,500,800][full.length] * state.level;
    state.combo += 1;

    const newLevel = 1 + Math.floor(state.lines/10);
    if(newLevel !== state.level){
      state.level = newLevel;
      state.dropMs = Math.max(120, 520 - (state.level-1)*38);
    }
    updateUI();
  }

  function takeNextPiece(){
    piece = spawnPiece(nextShape);
    nextShape = clone(SHAPES[rnd(SHAPES.length)]);
    drawNext();
    if(collide(piece.x, piece.y, piece.shape)) setGameOver();
  }

  function softDrop(){
    if(state.gameOver) return;
    if(!collide(piece.x, piece.y+1, piece.shape)){
      piece.y++;
    } else {
      merge();
      if(state.gameOver) return;
      sfxLock();
      clearLines();
      takeNextPiece();
    }
  }

  function hardDrop(){
    if(state.gameOver) return;
    while(!collide(piece.x, piece.y+1, piece.shape)){
      piece.y++;
    }
    merge();
    if(state.gameOver) return;
    sfxDrop();
    sfxLock();
    clearLines();
    takeNextPiece();
  }

  /* =========================
     SOUND: MUSIC / SFX split + gameover music switch
     - “One More Time vibe” = 프렌치하우스/디스코 하우스 느낌의 자체 루프(멜로디 복제 없음)
  ========================= */
  let audioCtx = null;
  let musicOn = false;
  let sfxOn = true;

  let musicGain = null;
  let sfxGain = null;

  let timer = null;
  let nextNoteTime = 0;
  let stepIndex = 0;

  const BPM = 124;
  const secondsPerBeat = 60 / BPM;
  const STEP = 0.25;                 // 16th
  const stepSec = secondsPerBeat * STEP;

  const LOOKAHEAD_MS = 25;
  const SCHEDULE_AHEAD_SEC = 0.14;

  let pump = 0; // sidechain-ish
  let bgBlocked = false;

  function ensureAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();

    if(!musicGain){
      musicGain = audioCtx.createGain();
      musicGain.gain.value = 0.18;
      musicGain.connect(audioCtx.destination);
    }
    if(!sfxGain){
      sfxGain = audioCtx.createGain();
      sfxGain.gain.value = 0.20;
      sfxGain.connect(audioCtx.destination);
    }
  }

  async function hardStopAudio(){
    bgBlocked = true;
    stopMusic();
    clearPendingTimeouts();
    if(audioCtx){ try{ await audioCtx.suspend(); }catch(e){} }
  }
  async function hardResumeAudio(){
    bgBlocked = false;
    if(musicOn){ ensureAudio(); startMusic(); }
  }
  document.addEventListener("visibilitychange", () => {
    if(document.hidden) hardStopAudio();
    else hardResumeAudio();
  });
  window.addEventListener("pagehide", () => hardStopAudio());
  window.addEventListener("blur", () => hardStopAudio());
  window.addEventListener("pageshow", () => hardResumeAudio());
  window.addEventListener("focus", () => hardResumeAudio());

  function oscAt(time, freq, dur, type, vol, outGain){
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, time);
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(vol, time + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    o.connect(g).connect(outGain);
    o.start(time);
    o.stop(time + dur + 0.02);
  }

  function noiseAt(time, dur, vol, outGain){
    const len = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<len;i++) data[i] = (Math.random()*2-1) * (1 - i/len);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    src.connect(g).connect(outGain);
    src.start(time);
    src.stop(time + dur + 0.01);
  }

  function applyPump(){
    pump *= 0.90;
    const base = state.gameOver ? 0.14 : 0.18;
    const target = base * (1 - 0.55 * pump);
    if(musicGain) musicGain.gain.setTargetAtTime(target, audioCtx.currentTime, 0.02);
  }

  // ----- SFX (toggleable) -----
  function sfxBeep(freq, dur=0.05, type="square", vol=0.04){
    if(!sfxOn) return;
    if(bgBlocked || document.hidden) return;
    ensureAudio();
    oscAt(audioCtx.currentTime + 0.001, freq, dur, type, vol, sfxGain);
  }
  function sfxNoise(dur=0.02, vol=0.02){
    if(!sfxOn) return;
    if(bgBlocked || document.hidden) return;
    ensureAudio();
    noiseAt(audioCtx.currentTime + 0.001, dur, vol, sfxGain);
  }
  function sfxTap(){ sfxBeep(520, 0.035, "square", 0.018); }
  function sfxRotate(){ sfxBeep(760, 0.045, "square", 0.020); }
  function sfxDrop(){ sfxBeep(220, 0.060, "sawtooth", 0.022); }
  function sfxLock(){ sfxBeep(170, 0.045, "triangle", 0.016); }
  function sfxLineClear(n){
    const base = 520 + n*120;
    sfxBeep(base, 0.070, "square", 0.024);
    later(()=>sfxBeep(base*1.26, 0.065, "square", 0.022), 70);
    later(()=>sfxNoise(0.03, 0.018), 40);
  }
  function sfxGameOverAww(){
    // “암울” 하강 톤 + 짧은 노이즈
    sfxBeep(220, 0.12, "triangle", 0.030);
    later(()=>sfxBeep(174, 0.14, "triangle", 0.028), 120);
    later(()=>sfxBeep(130, 0.18, "triangle", 0.026), 260);
    later(()=>sfxNoise(0.10, 0.020), 120);
  }

  // ----- MUSIC (two modes: normal / gameover) -----
  // normal: french house/disco-house 느낌의 자체 루프 (멜로디 복제 없음)
  // gameover: 저역 드론 + 느린 펄스(암울)
  function kickAt(time){
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(140, time);
    o.frequency.exponentialRampToValueAtTime(55, time + 0.10);
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(0.55, time + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.18);
    o.connect(g).connect(musicGain);
    o.start(time); o.stop(time + 0.22);
    pump = 1.0;
  }
  function clapAt(time){
    noiseAt(time, 0.06, 0.10, musicGain);
    oscAt(time, 220, 0.05, "triangle", 0.04, musicGain);
  }
  function hatAt(time, open=false){
    noiseAt(time, open ? 0.06 : 0.02, open ? 0.06 : 0.045, musicGain);
  }

  function bassAt(time, semitone){
    // 짧은 톱니 + 살짝 디튠
    const base = 55;
    const f = base * Math.pow(2, semitone/12);
    oscAt(time, f, 0.10, "sawtooth", 0.06, musicGain);
    oscAt(time, f*1.01, 0.08, "sawtooth", 0.03, musicGain);
  }

  function chordStabAt(time, semitone){
    // 디스코 하우스 느낌의 짧은 스탭(3음)
    const base = 220;
    const root = base * Math.pow(2, semitone/12);
    oscAt(time, root, 0.10, "square", 0.028, musicGain);
    oscAt(time, root*Math.pow(2, 4/12), 0.10, "square", 0.020, musicGain);
    oscAt(time, root*Math.pow(2, 7/12), 0.10, "square", 0.018, musicGain);
  }

  function glitterLeadAt(time, semitone){
    const base = 440;
    const f = base * Math.pow(2, semitone/12);
    oscAt(time, f, 0.07, "triangle", 0.020, musicGain);
    oscAt(time+0.01, f*2, 0.05, "triangle", 0.010, musicGain);
  }

  // gameover music parts
  function doomDroneAt(time){
    // 저역 드론 + 느린 펄스
    const base = 55;
    oscAt(time, base, 0.45, "sine", 0.05, musicGain);
    oscAt(time, base*0.5, 0.45, "sine", 0.04, musicGain);
    noiseAt(time+0.02, 0.10, 0.03, musicGain);
  }

  // patterns (자체 구성)
  const bassProg = [0, 0, 3, 0, 5, 3, 0, 7];     // A 기반
  const stabProg = [0, 0, 5, 3, 0, 7, 5, 3];
  const leadProg = [12, 15, 14, 12, 10, 12, 14, 15];

  function scheduleNormal(i, time){
    const beat16 = i % 16;

    if(beat16 % 4 === 0) kickAt(time);
    if(beat16 === 4 || beat16 === 12) clapAt(time);
    if(beat16 % 2 === 1) hatAt(time, false);
    if(beat16 === 15) hatAt(time, true);

    if(beat16 % 4 === 0){
      const idx = (Math.floor(i/4)) % bassProg.length;
      bassAt(time + 0.01, bassProg[idx]);
    }

    // chord stabs: offbeat(2,4,6,8...) 느낌
    if(beat16 % 2 === 0 && beat16 !== 0){
      const idx = (Math.floor(i/2)) % stabProg.length;
      chordStabAt(time + 0.006, stabProg[idx] + 12);
    }

    // glitter lead: 마디 후반만 조금
    if(beat16 >= 8 && (beat16 % 2 === 0)){
      const idx = (Math.floor(i/2)) % leadProg.length;
      glitterLeadAt(time + 0.01, leadProg[idx]);
    }
  }

  function scheduleGameOver(i, time){
    const beat16 = i % 16;
    // 느린 펄스: 8th마다 드론
    if(beat16 % 2 === 0){
      doomDroneAt(time);
    }
    // 가끔 낮은 킥 비슷한 둔탁함
    if(beat16 % 8 === 0){
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(90, time);
      o.frequency.exponentialRampToValueAtTime(40, time + 0.18);
      g.gain.setValueAtTime(0.0001, time);
      g.gain.linearRampToValueAtTime(0.35, time + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, time + 0.28);
      o.connect(g).connect(musicGain);
      o.start(time); o.stop(time+0.32);
      pump = 0.5;
    }
  }

  function scheduler(){
    if(!musicOn || !audioCtx) return;
    if(bgBlocked || document.hidden) return;
    if(audioCtx.state === "suspended") audioCtx.resume();

    applyPump();

    while(nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD_SEC){
      if(state.gameOver) scheduleGameOver(stepIndex, nextNoteTime);
      else scheduleNormal(stepIndex, nextNoteTime);

      nextNoteTime += stepSec;
      stepIndex++;
    }
  }

  function startMusic(){
    ensureAudio();
    stopMusic();
    stepIndex = 0;
    nextNoteTime = audioCtx.currentTime + 0.03;
    pump = 0;
    timer = setInterval(scheduler, LOOKAHEAD_MS);
  }
  function stopMusic(){
    if(timer){ clearInterval(timer); timer = null; }
  }

  const musicBtn = document.getElementById("musicBtn");
  const sfxBtn = document.getElementById("sfxBtn");

  function refreshSoundUI(){
    musicBtn.textContent = musicOn ? "MUSIC ON" : "MUSIC OFF";
    sfxBtn.textContent = sfxOn ? "SFX ON" : "SFX OFF";
  }

  musicBtn.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    musicOn = !musicOn;
    if(musicOn){
      ensureAudio();
      startMusic();
    }else{
      stopMusic();
    }
    refreshSoundUI();
  }, {passive:false});

  sfxBtn.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    sfxOn = !sfxOn;
    sfxBeep(660, 0.04, "square", 0.018);
    refreshSoundUI();
  }, {passive:false});

  refreshSoundUI();

  /* =========================
     INPUT
  ========================= */
  function act(a){
    if(state.gameOver) return;
    if(state.paused) return;

    if(a==="left"){ moveLeft(); sfxTap(); }
    else if(a==="right"){ moveRight(); sfxTap(); }
    else if(a==="down"){ softDrop(); sfxTap(); }
    else if(a==="drop"){ hardDrop(); }
    else if(a==="cw"){ doRotateCW(); sfxRotate(); }
  }

  document.querySelectorAll(".tbtn").forEach(btn=>{
    const a = btn.dataset.act;
    btn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      btn.setPointerCapture?.(e.pointerId);
      act(a);
      draw();
    }, {passive:false});
  });

  window.addEventListener("keydown", (e)=>{
    if(e.key==="ArrowLeft") act("left");
    else if(e.key==="ArrowRight") act("right");
    else if(e.key==="ArrowDown") act("down");
    else if(e.key===" ") act("drop");
    else if(e.key==="x" || e.key==="X" || e.key==="ArrowUp") act("cw");
    draw();
  });

  /* =========================
     RESET
  ========================= */
  function resetGame(){
    board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));

    nextShape = clone(SHAPES[rnd(SHAPES.length)]);
    piece = spawnPiece(nextShape);
    nextShape = clone(SHAPES[rnd(SHAPES.length)]);
    drawNext();

    state.score = 0;
    state.level = 1;
    state.lines = 0;
    state.combo = 0;
    state.dropMs = 520;
    state.paused = false;
    state.gameOver = false;

    flashRows = [];
    flashUntil = 0;

    clearPendingTimeouts();
    overlay.classList.remove("show");

    updateUI();
    draw();

    // gameover였다면 음악 모드가 자동으로 정상으로 복귀됨(스케줄러가 state.gameOver를 봄)
  }

  document.getElementById("resetBtn").addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    resetGame();
    sfxBeep(330, 0.06, "triangle", 0.016);
  }, {passive:false});

  retryBtn.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    resetGame();
    sfxBeep(520, 0.05, "square", 0.016);
  }, {passive:false});

  /* =========================
     GAME OVER
  ========================= */
  function setGameOver(){
    if(state.gameOver) return;
    state.gameOver = true;

    finalScoreEl.textContent = String(state.score);
    finalLinesEl.textContent = String(state.lines);

    // 암울한 효과음
    sfxGameOverAww();

    // 오버레이
    overlay.classList.add("show");

    // 랭킹 로드
    loadWorldRanking();
  }

  /* =========================
     LOOP
  ========================= */
  let last = performance.now();
  function loop(t){
    if(!state.gameOver){
      if(t - last >= state.dropMs){
        softDrop();
        last = t;
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  /* =========================
     FIRESTORE WORLD RANKING
     - 최소 동작 버전(치팅 방지 X)
  ========================= */
  // 1) Firebase 콘솔 > 프로젝트 설정 > 웹 앱 추가 > config 복사
  // 2) 아래 firebaseConfig를 교체
  // 3) Firestore Database 생성(테스트 모드로 시작 가능)
  let db = null;

  const firebaseConfig = {
    // ✅ 여기에 본인 Firebase 웹 config 붙여넣기
    // apiKey: "...",
    // authDomain: "...",
    // projectId: "...",
    // storageBucket: "...",
    // messagingSenderId: "...",
    // appId: "..."
  };

  function initFirestoreIfReady(){
    try{
      if(!firebaseConfig || !firebaseConfig.projectId) return false;
      if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      return true;
    }catch(e){
      return false;
    }
  }

  function sanitizeName(s){
    s = (s || "").trim();
    if(!s) return "ANON";
    // 너무 공격적이지 않게 최소 필터
    s = s.replace(/[^\p{L}\p{N}_\- ]/gu, "").trim();
    if(!s) return "ANON";
    return s.slice(0,14);
  }

  function renderRanking(items){
    rankList.innerHTML = "";
    if(!items.length){
      rankList.innerHTML = `<div class="rankItem"><span><small>NO DATA</small></span><span><small>-</small></span></div>`;
      return;
    }
    items.forEach((it, idx)=>{
      const name = it.name || "ANON";
      const score = it.score ?? 0;
      const lines = it.lines ?? 0;
      const row = document.createElement("div");
      row.className = "rankItem";
      row.innerHTML = `
        <span>${String(idx+1).padStart(2,"0")} <small>${escapeHtml(name)}</small></span>
        <span>${score} <small>(${lines}L)</small></span>
      `;
      rankList.appendChild(row);
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, (m)=>({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[m]));
  }

  async function loadWorldRanking(){
    // config 없으면 안내
    if(!initFirestoreIfReady()){
      renderRanking([]);
      return;
    }
    try{
      const snap = await db.collection("scores")
        .orderBy("score","desc")
        .orderBy("ts","asc")
        .limit(20)
        .get();

      const items = [];
      snap.forEach(doc => items.push(doc.data()));
      renderRanking(items);
    }catch(e){
      renderRanking([]);
    }
  }

  async function submitScore(){
    if(!state.gameOver) return;
    if(!initFirestoreIfReady()){
      // config 미설정이면 그냥 무시
      return;
    }

    // 간단한 클라 제한(스팸 완전 방지는 불가)
    const now = Date.now();
    const lastSubmit = Number(localStorage.getItem("cat_tetris_last_submit") || "0");
    if(now - lastSubmit < 15000) return; // 15초 쿨다운
    localStorage.setItem("cat_tetris_last_submit", String(now));

    const name = sanitizeName(nameInput.value);
    nameInput.value = name;
    localStorage.setItem("cat_tetris_name", name);

    const payload = {
      name,
      score: state.score,
      lines: state.lines,
      level: state.level,
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      // 간단한 디바이스 힌트(선택)
      ua: navigator.userAgent.slice(0,120)
    };

    try{
      await db.collection("scores").add(payload);
      await loadWorldRanking();
      sfxBeep(880, 0.05, "square", 0.016);
    }catch(e){
      // ignore
    }
  }

  submitScoreBtn.addEventListener("pointerdown", (e)=>{
    e.preventDefault();
    submitScore();
  }, {passive:false});

  // 이름 자동 로드
  const savedName = localStorage.getItem("cat_tetris_name");
  if(savedName) nameInput.value = savedName;

  /* =========================
     START
  ========================= */
  updateUI();
  drawNext();
  draw();
  requestAnimationFrame(loop);

  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("./sw.js");
  }

})();
</script>
</body>
